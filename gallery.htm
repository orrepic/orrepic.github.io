<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Goto-orrepic</title>
    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/1.1.1/typed.min.js"></script>
</head>
<body>
    <script src="anime.min.js"></script>

    <div class="terminal-window">
        <section class="terminal">
            <div class="history"></div>
            $&nbsp;<span class="prompt"></span>
            <span class="typed-cursor"></span>

        </section>
    </div>
    <!-- data -->
    <div class="terminal-data Goto-gallery-run-output">

        <br>Works Gallery<br>
        ----------------------------------------------<br><br>

        &nbsp;&nbsp;<span><a class="pink" href="orrepic.github.io/the-session/">The Session</a></span><br>
        &nbsp;&nbsp;&nbsp;<span class="gray">What is this?!</span><br><br>
        &nbsp;&nbsp;<span><a class="pink" href="https://orrepic.github.io/Randomness-on-The-12-Equal-Temperament/">Randomness on The 12 Equal Temperament</a></span><br>
        &nbsp;&nbsp;&nbsp;<span class="gray">I have nothing to explain.</span><br>
        <br>

    </div>

    <div class="container">
    </div>


    <script>

        const container = document.querySelector(".container");

        for(var i=0; i<80; i++){
            const blocks = document.createElement("div");
            blocks.classList.add("block");
            container.appendChild(blocks);
        }

    </script>

    <script type="text/javascript" src="g_terminal.js"></script>

    <script>
        var path = anime.path('#svg2 path');
        var d = 3000;

        function an1(){

            

            anime({
                targets: '.block',
                translateY: function() {
                    return (anime.random(500, -700))
                },
                translateX: function() {
                    return (anime.random(400, -400))
                },
                rotate: function() {
                    return (anime.random(50, -50))
                },
                // duration: 500,
                // delay: anime.stagger(500),
                easing: "easeOutElastic(1, 0.4)",
                duration: d,
                complete: an2,
            });

        }

        function an2(){
            anime({
                targets: '.block',
                scale: [
                    {value: .1, easing: 'easeOutSine', duration: 500},
                    {value: 1, easing: 'easeInOutQuad', duration: 1200}
                ],
                delay: anime.stagger(200, {grid: [14, 5], from: 'center'}),
                duration: d,
                complete: an3,
            });
        }

        function an3(){
            anime({
                targets: '.block',
                translateX: anime.stagger(0, {grid: [14, 5], from: 'center', axis: 'x'}),
                translateY: anime.stagger(0, {grid: [14, 5], from: 'center', axis: 'y'}),
                rotateZ: anime.stagger([0, 90], {grid: [14, 5], from: 'center', axis: 'x'}),
                delay: anime.stagger(200, {grid: [14, 5], from: 'center'}),
                easing: 'easeInOutQuad',
                duration: d,
                complete: an4,
            });
        }

        function an4(){
            anime({
                targets: '.block',
                translateX: function() {
                    return String('+='+String(anime.random(50,-50)))},
                translateY: function() {
                    return String('+='+String(anime.random(50,-50)))},
                delay: anime.stagger(100), // increase delay by 100ms for each elements.
                complete: an1,
                });
            
        }
        

        an1()


    </script>

</body>
</html>
